# .github/workflows/ci.yml

name: CI Pipeline

# What triggers this workflow?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Define the jobs
jobs:
  build-and-test:
    # The type of machine to run on
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          ACCEPT_EULA: Y
        ports:
          - 1433:1433

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up .NET SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Step 3: Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Check code formatting
      - name: Check formatting
        run: dotnet format --verify-no-changes

      # Step 5: Build the project
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Step 6: Run unit tests
      - name: Run Unit Tests
        run: dotnet test Automated_Deployment.Tests --no-restore --verbosity normal

      # Step 7: Run integration tests
      - name: Run Integration Tests
        env:
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
        run: dotnet test Automated_Deployment.IntegrationTests --no-restore --verbosity normal


      # Step 8: Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 9: Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/ahmedeldamaty20/automated_deployment:latest
          
      # Step 10: Login to Azure
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 11: Run Database Migrations
      - name: Run Database Migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update --project Automated_Deployment --no-build

      # Step 12: Deploy to Azure Container Apps
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name automated-deployment-app \
            --resource-group automated-deployment-rg \
            --image ghcr.io/ahmedeldamaty20/automated_deployment:latest
            
