# .github/workflows/ci.yml

name: CI Pipeline

# What triggers this workflow?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Define the jobs
jobs:
  build-and-test:
    # The type of machine to run on
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          ACCEPT_EULA: Y
        ports:
          - 1433:1433

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up .NET SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Step 3: Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Check code formatting
      - name: Check formatting
        run: dotnet format --verify-no-changes

      # Step 5: Build the project
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # Step 6: Run unit tests
      - name: Run Unit Tests
        run: dotnet test Automated_Deployment.Tests --no-restore --verbosity normal

      # Step 7: Run integration tests
      - name: Run Integration Tests
        run: dotnet test Automated_Deployment.IntegrationTests --no-restore --verbosity normal
